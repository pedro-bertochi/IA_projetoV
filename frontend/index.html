<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Classificador de Soldas</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <div id="drop-area" class="drop-area">
        <p>Arraste as imagens aqui ou clique para selecionar os arquivos</p>
        <input type="file" id="fileElem" multiple accept="image/*">
    </div>
    <div class="file-list" id="fileList"></div>
    <button id="enviarBtn">Classificar Soldas</button>
    <div id="resultado" class="file-list"></div>

</div>
<script src="script.js"></script>
</body>
</html>
